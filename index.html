<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Results summary component</title>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@500;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">

</head>
<body class="bg-paleBlue min-h-screen flex flex-col items-center justify-center font-hanken">

  
    <div class="bg-white rounded-3xl shadow-xl flex flex-col md:flex-row max-w-[700px] overflow-hidden"> 
      <div class="flex flex-col items-center text-center p-8 md:w-1/2
        bg-gradient-to-b from-[hsl(252,100%,67%)] to-[hsl(241,81%,54%)] text-white">
        <p class="text-lightLavender text-lg mb-6">Your Result</p>
        <div class="w-40 h-40 rounded-full flex flex-col items-center justify-center mb-6 bg-gradient-to-b from-[hsla(256,72%,46%,1)] to-[hsla(241,72%,46%,0)]">
          <h1 class="text-6xl font-extrabold">76</h1>
          <p class="text-lightLavender">of 100</p>
        </div>
        <h2 class="text-2xl font-bold">Great</h2>
        <p class="text-lightLavender max-w-[220px]">
        You scored higher than 65% of the people who have taken these tests.
        </p>
      </div>
      <div class="p-8 md:w-1/2">
        <h2 class="text-darkGrayBlue font-bold text-xl mb-6">Summary</h2>
        <div class="space-y-4">
          <div class="flex justify-between items-center bg-red-50 p-4 rounded-lg">
            <p class="text-lightRed font-semibold">Reaction</p>
            <p class="text-darkGrayBlue font-bold">80 <span class="text-gray-400">/ 100</span></p>
          </div>
          <div class="flex justify-between items-center bg-yellow-50 p-4 rounded-lg">
            <p class="text-orangeyYellow font-semibold">Memory</p>
            <p class="text-darkGrayBlue font-bold">92 <span class="text-gray-400">/ 100</span></p>
          </div>
          <div class="flex justify-between items-center bg-green-50 p-4 rounded-lg">
            <p class="text-greenTeal font-semibold">Verbal</p>
            <p class="text-darkGrayBlue font-bold">61 <span class="text-gray-400">/ 100</span></p>
          </div>
          <div class="flex justify-between items-center bg-blue-50 p-4 rounded-lg">
            <p class="text-cobaltBlue font-semibold">Visual</p>
            <p class="text-darkGrayBlue font-bold">73 <span class="text-gray-400">/ 100</span></p>
          </div>
        </div>
        <button class="mt-8 w-full bg-[hsl(224_30%_27%)] text-white py-4 rounded-full font-bold hover:opacity-90 transition">Continue</button>
      </div>
    </div>
  
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Swastik Jindal</a>.
  </div>
</body>
</html>
